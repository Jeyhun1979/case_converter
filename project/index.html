<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Конвертер валют и актуальные курсы" />
    <title>FX Converter</title>
    <link rel="preconnect" href="https://open.er-api.com" crossorigin />
    <script>
      (function () {
        var theme = localStorage.getItem('fx-theme')
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches
            ? 'light'
            : 'dark'
        }
        document.documentElement.dataset.theme = theme
        var locale = localStorage.getItem('fx-locale')
        if (locale === 'ru' || locale === 'en') {
          document.documentElement.lang = locale
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
